# .github/workflows/deploy.yml
# Deploys to Firebase on push to main.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   VITE_FIREBASE_MEASUREMENT_ID
#   CRYPTO_SECRET          — random secret for offline data HMAC signing
#   GCP_SA_KEY             — Firebase service account JSON (project settings → Service accounts)

name: Build and Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Root Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Functions Dependencies
        run: npm ci --prefix functions

      - name: Create .env file for Firebase Functions
        run: echo "CRYPTO_SECRET=${{ secrets.CRYPTO_SECRET }}" > functions/.env

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project default
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
